{% extends "auctions/base_admin.html" %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h1 class="display-5 fw-bold">Manage {{ title|capfirst }}s</h1> 
    
    <a href="/admin/auctions/{{ model_name }}/add/" class="btn btn-info fw-bold rounded-pill px-4">
        + Add New {{ title|capfirst }}
    </a>
</div>

<div class="card bg-dark border-secondary shadow-lg" style="border-radius: 20px; overflow: hidden;">
    <div class="card-body p-0">
        <table class="table table-dark table-hover mb-0">
            <thead>
                <tr style="border-bottom: 2px solid #30363d;">
                    <th class="p-4">ID</th>
                    <th class="p-4">Entry Name</th>
                    <th class="p-4 text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for item in data %}
                <tr style="border-bottom: 1px solid #21262d;">
                    <td class="p-4 text-info fw-bold">#{{ item.id }}</td>
                    <td class="p-4 text-white">{{ item }}</td>
                    <td class="p-4 text-end">
                        <a href="/admin/auctions/{{ model_name }}/{{ item.id }}/change/" class="btn btn-sm btn-outline-info rounded-pill px-3">
                            Edit
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center p-5 text-muted">No records found in this table.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
