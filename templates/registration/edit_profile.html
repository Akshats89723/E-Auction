{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 p-4" style="border-radius: 20px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold"><i class="bi bi-person-circle me-2 text-primary"></i>Update Profile</h2>
                <p class="text-muted">Change your name and upload a new profile picture.</p>
            </div>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="text-center mb-4 position-relative">
                    {% if user.profile_photo %}
                        <img id="imagePreview" src="{{ user.profile_photo.url }}" 
                             class="rounded-circle border border-4 border-white shadow-sm" 
                             style="width: 140px; height: 140px; object-fit: cover;">
                    {% else %}
                        <div id="placeholderPreview" class="bg-primary rounded-circle d-flex align-items-center justify-content-center mx-auto shadow-sm" 
                             style="width: 140px; height: 140px;">
                            <i class="bi bi-person-fill text-white" style="font-size: 5rem;"></i>
                        </div>
                        <img id="imagePreview" class="rounded-circle border border-4 border-white shadow-sm d-none" 
                             style="width: 140px; height: 140px; object-fit: cover;">
                    {% endif %}
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">FIRST NAME</label>
                    {{ form.first_name }}
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">LAST NAME</label>
                    {{ form.last_name }}
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">UPLOAD PROFILE PHOTO</label>
                    {{ form.profile_photo }}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill shadow-sm py-3">
                        Save Changes
                    </button>
                    <a href="{% url 'auction_list' %}" class="btn btn-light rounded-pill py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Listen for changes in the file input field
    document.getElementById('id_profile_photo').addEventListener('change', function(event) {
        const input = event.target;
        
        // If a file has been selected
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            // When the file is read, update the preview image
            reader.onload = function(e) {
                const previewImg = document.getElementById('imagePreview');
                const placeholder = document.getElementById('placeholderPreview');
                
                // Set the new image source
                previewImg.src = e.target.result;
                // Ensure the preview image is visible
                previewImg.classList.remove('d-none'); 
                
                // Hide the placeholder icon if it was visible
                if (placeholder) {
                    placeholder.classList.add('d-none');
                }
            }
            
            // Read the file as a data URL for display
            reader.readAsDataURL(input.files[0]);
        }
    });
</script>
{% endblock %}
